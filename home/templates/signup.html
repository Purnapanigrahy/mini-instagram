{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Insta - Sign Up</title>
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
</head>
<body>
<div id="error-box" class="error-box">
  {{ error }}
</div>
<div class="container">

    <!-- Left Section -->
    <div class="left">
        <h1>Mini Insta</h1>
        <p>Join and start sharing your moments.</p>
    </div>

    <!-- Right Section -->
    <div class="right">
        <div class="form-box">

            <h2>Mini Insta</h2>
            <p class="sub-text">Sign up to see photos and videos from your friends.</p>

            <form method="post">
                {% csrf_token %}
                <input name="username" type="text" placeholder="Username" required>
                <input name="email" type="email" placeholder="Email" required>
                <input name="password" type="password" placeholder="Password" required>
                <input name="cnf_password" type="password" placeholder="Confirm Password" required>

                <button type="submit">Sign Up</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <p class="switch">
                Already have an account? <a href="{% url 'signin' %}">Log in</a>
            </p>

        </div>
    </div>

</div>
<script src="{% static 'js/error.js' %}"></script>
</body>
</html>
