{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home</title>
    <link rel="stylesheet" href="{% static 'css/temp.css' %}">

</head>
<body>

    <!-- home.html -->

    <div class="feed-container">

    {% for post in posts %}

    <div class="post-card">

        <a href="{% url 'user_profile' post.user.id %}"><div class="post-header">
            <img src="{{ post.user.profile.profile_pic.url }}"
                 alt="profile"
                 class="profile-pic">

            <span class="username">
                {{ post.user.username }} 
            </span>
        </div></a>

        <div class="post-image-container">
            <img src="{{ post.image.url }}"
                 alt="post"
                 class="post-image">
        </div>

        <div class="post-actions">

            <button class="action-btn">
                ❤️
            </button>

            <button class="action-btn">
                💬
            </button>

            <button class="action-btn">
                📤
            </button>


        </div>

        <div class="post-content">

            <p class="likes">
                <strong>{{like.count}}</strong>
            </p>

            <p class="caption">
                <strong>{{ post.user.username }}</strong>
                {{ post.caption }}
            </p>
            {{ post.created_at.date }}

            <p class="comments">
                View all comments
            </p>

        </div>

    </div>

    {% endfor %}

    </div>


<div class="bottom-nav">

    <a href="{% url 'home' %}" class="nav-item">
        <span>🏠</span>
        <p>Home</p>
    </a>

    <a href="{% url 'search' %}" class="nav-item">
        <span>🔍</span>
        <p>Search</p>
    </a>

    <a href="{% url 'create_post' %}" class="nav-item add-btn">
        <span>➕</span>
    </a>

    <a href="{% url 'reels' %}" class="nav-item">
        <span>🎬</span>
        <p>Reels</p>
    </a>

    <a href="{% url 'profile' %}" class="nav-item">
        <img src="{{ request.user.profile.profile_pic.url }}" alt="Profile">
        <p>Profile</p>
    </a>

</div>
</body>
</html>
