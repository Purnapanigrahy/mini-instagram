{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="{% static 'css/profile.css' %}">
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="profile-header">
        <div class="profile-img">
            <img src="{{ request.user.profile.profile_pic.url }}" alt="profile">
        </div>

        <div class="profile-details">
            <div class="top-row">
                <h2>{{request.user.username}}</h2>
                <a href="{% url 'edit_profile' %}"><button>Edit Profile</button></a>
            </div>

            <div class="stats">
                <span><b>54</b> posts</span>
                <span><b>1.2k</b> followers</span>
                <span><b>300</b> following</span>
            </div>

            <div class="bio">
                <p>{{ request.user.profile.bio }}</p>
            </div>
        </div>
    </div>

    <!-- Divider -->
    <hr>

    <!-- Posts -->
    <div class="posts">
        
    </div>

</div>

</body>
</html>
