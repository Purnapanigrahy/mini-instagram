{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="{% static 'css/profile.css' %}">
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="profile-header">
        <div class="profile-img">
            <img src="https://via.placeholder.com/150" alt="profile">
        </div>

        <div class="profile-details">
            <div class="top-row">
                <h2>username</h2>
                <button>Edit Profile</button>
            </div>

            <div class="stats">
                <span><b>54</b> posts</span>
                <span><b>1.2k</b> followers</span>
                <span><b>300</b> following</span>
            </div>

            <div class="bio">
                <p><b>Your Name</b></p>
                <p>Web Developer 🚀 | Django | React</p>
            </div>
        </div>
    </div>

    <!-- Divider -->
    <hr>

    <!-- Posts -->
    <div class="posts">
        
    </div>

</div>

</body>
</html>
