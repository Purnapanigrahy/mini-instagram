{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Insta</title>
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
</head>
<body>

<div class="container">

    <!-- Left Section -->
    <div class="left">
        <h1>Mini Insta</h1>
        <p>Share your moments with the world.</p>
    </div>

    <!-- Right Section -->
    <div class="right">
        <div class="form-box">

            <h2>Mini Insta</h2>

            <form method="post">
                {% csrf_token %}
                <input name="userormail" type="text" placeholder="Username or Email" required>
                <input name="password" type="password" placeholder="Password" required>

                <button type="submit">Log In</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <p class="switch">
                Don't have an account? <a href="{% url 'signup' %}">Sign up</a>
            </p>

        </div>
    </div>

</div>

</body>
</html>
